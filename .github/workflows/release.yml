name: Release Go Module

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to Go Module Proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"

      - name: Sync embedded model catalog
        run: ./scripts/sync-model-catalog.sh

      - name: Verify release build
        run: go test -count=1 ./...

      - name: Index module version
        env:
          VERSION: ${{ github.ref_name }}
        run: GOPROXY=https://proxy.golang.org go list -m langdag.com/langdag@$VERSION
