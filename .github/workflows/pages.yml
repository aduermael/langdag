name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Use latest committed model catalog
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin model-catalog >/dev/null 2>&1; then
            git fetch --depth=1 origin model-catalog
            if git checkout FETCH_HEAD -- docs/model-catalog/v1/catalog.json; then
              echo "Using catalog from origin/model-catalog"
            else
              echo "origin/model-catalog has no catalog artifact; using catalog committed on this ref"
            fi
          else
            echo "model-catalog branch does not exist; using catalog committed on this ref"
          fi

      - name: Inject version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
          sed -i "s/__VERSION__/$VERSION/g" docs/index.html

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
