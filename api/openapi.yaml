openapi: 3.1.0
info:
  title: LangDAG API
  description: |
    REST API for managing LLM conversations as node trees.

    Everything is a node. A root node (parent_id = null) defines a conversation tree.
    Prompting from any node creates a child, enabling natural branching and exploration.

    ## Streaming

    Prompt endpoints support real-time streaming via SSE. Set `stream: true` in the request body
    to receive incremental responses as they're generated.

    SSE events:
    - `start` - Stream started
    - `delta` - Incremental content chunk
    - `done` - Stream complete, includes `node_id`
    - `error` - Error occurred

    ## IDs

    All IDs are UUIDs. For convenience, partial ID prefixes are accepted (minimum 4 characters).

    ## Aliases

    Nodes can be given human-readable aliases for easy reference. An alias is a unique string
    that maps to a node ID, useful for bookmarking important nodes or migrating from other systems.
  version: 3.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - ApiKeyAuth: []
  - BearerAuth: []

tags:
  - name: health
    description: Health check endpoints
  - name: prompt
    description: Prompt endpoints for starting and continuing conversations
  - name: nodes
    description: Node management
  - name: aliases
    description: Node alias management

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      description: Returns server health status
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /prompt:
    post:
      tags: [prompt]
      summary: Start new conversation tree
      description: |
        Creates a new conversation tree by sending a message. Returns the assistant's response node.

        Set `stream: true` to receive the response as SSE.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptRequest'
      responses:
        '200':
          description: Prompt response (non-streaming) or SSE stream
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SSEStream'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /nodes/{id}/prompt:
    post:
      tags: [prompt]
      summary: Continue from existing node
      description: |
        Continues a conversation from an existing node by adding a new message.
        This creates a child branch from the specified node.

        Set `stream: true` to receive the response as SSE.
      parameters:
        - name: id
          in: path
          required: true
          description: Node ID (full or prefix)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodePromptRequest'
      responses:
        '200':
          description: Prompt response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SSEStream'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /nodes:
    get:
      tags: [nodes]
      summary: List root nodes
      description: Returns all root nodes (conversations). Root nodes have no parent.
      responses:
        '200':
          description: List of root nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Node'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /nodes/{id}:
    get:
      tags: [nodes]
      summary: Get a single node
      description: Returns a single node by ID
      parameters:
        - name: id
          in: path
          required: true
          description: Node ID (full or prefix)
          schema:
            type: string
      responses:
        '200':
          description: Node details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [nodes]
      summary: Delete node and subtree
      description: Deletes a node and all its descendants
      parameters:
        - name: id
          in: path
          required: true
          description: Node ID (full or prefix)
          schema:
            type: string
      responses:
        '200':
          description: Node deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
                  id:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /nodes/{id}/tree:
    get:
      tags: [nodes]
      summary: Get full tree from node
      description: Returns the node and all its descendants as a flat array
      parameters:
        - name: id
          in: path
          required: true
          description: Node ID (full or prefix)
          schema:
            type: string
      responses:
        '200':
          description: Array of nodes in the subtree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Node'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /nodes/{id}/aliases:
    get:
      tags: [aliases]
      summary: List aliases for a node
      description: Returns all aliases assigned to the given node
      parameters:
        - name: id
          in: path
          required: true
          description: Node ID (full or prefix)
          schema:
            type: string
      responses:
        '200':
          description: List of aliases
          content:
            application/json:
              schema:
                type: object
                properties:
                  node_id:
                    type: string
                  aliases:
                    type: array
                    items:
                      type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /nodes/{id}/aliases/{alias}:
    put:
      tags: [aliases]
      summary: Create an alias for a node
      description: Assigns a human-readable alias to a node. The alias must be unique.
      parameters:
        - name: id
          in: path
          required: true
          description: Node ID (full or prefix)
          schema:
            type: string
        - name: alias
          in: path
          required: true
          description: The alias string
          schema:
            type: string
      responses:
        '201':
          description: Alias created
          content:
            application/json:
              schema:
                type: object
                properties:
                  alias:
                    type: string
                  node_id:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Alias already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /aliases/{alias}:
    delete:
      tags: [aliases]
      summary: Delete an alias
      description: Removes an alias. The node itself is not affected.
      parameters:
        - name: alias
          in: path
          required: true
          description: The alias to delete
          schema:
            type: string
      responses:
        '200':
          description: Alias deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
      required:
        - error

    Node:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          description: Parent node ID (null for root nodes)
        root_id:
          type: string
          format: uuid
        sequence:
          type: integer
          description: Node sequence number
        node_type:
          type: string
          enum: [user, assistant, system, tool_call, tool_result]
        content:
          type: string
          description: Node content (message text)
        provider:
          type: string
          description: Provider or deployment that served the response
        model:
          type: string
          description: LLM model used (on assistant nodes)
        tokens_in:
          type: integer
        tokens_out:
          type: integer
        tokens_cache_read:
          type: integer
        tokens_cache_creation:
          type: integer
        tokens_reasoning:
          type: integer
        latency_ms:
          type: integer
        stop_reason:
          type: string
        output_group_id:
          type: string
          format: uuid
          description: Identifier shared by assistant nodes produced by the same continuation chain
        status:
          type: string
        title:
          type: string
          description: Conversation title (on root nodes only)
        system_prompt:
          type: string
          description: System prompt (on root nodes only)
        created_at:
          type: string
          format: date-time
        metadata:
          $ref: '#/components/schemas/AssistantNodeMetadata'
        cost:
          $ref: '#/components/schemas/CostResult'
      required:
        - id
        - sequence
        - node_type
        - content
        - created_at

    PromptRequestBase:
      type: object
      properties:
        message:
          type: string
          description: Message to send
        model:
          type: string
          default: claude-sonnet-4-20250514
          description: LLM model to use
        stream:
          type: boolean
          default: false
          description: Enable SSE streaming
        tools:
          type: array
          description: Tool definitions available to the model
          items:
            $ref: '#/components/schemas/ToolDefinition'
      required:
        - message

    PromptRequest:
      allOf:
        - $ref: '#/components/schemas/PromptRequestBase'
        - type: object
          properties:
            system_prompt:
              type: string
              description: Optional system prompt (only for new conversations)

    NodePromptRequest:
      allOf:
        - $ref: '#/components/schemas/PromptRequestBase'

    ToolDefinition:
      type: object
      properties:
        name:
          type: string
          description: Tool name
        description:
          type: string
          description: Tool description shown to the model
        input_schema:
          type: object
          nullable: true
          description: JSON Schema for client-side function tool input. Omit or set null for server-side tools.
          additionalProperties: true
      required:
        - name

    PromptResponse:
      type: object
      properties:
        node_id:
          type: string
          format: uuid
          description: ID of the assistant's response node
        content:
          type: string
          description: Response content
        tokens_in:
          type: integer
        tokens_out:
          type: integer
        tokens_cache_read:
          type: integer
        tokens_cache_creation:
          type: integer
        tokens_reasoning:
          type: integer
        output_group_id:
          type: string
          format: uuid
          description: Identifier shared by assistant nodes produced by the same continuation chain
        usage:
          $ref: '#/components/schemas/NormalizedUsage'
        metadata:
          $ref: '#/components/schemas/AssistantNodeMetadata'
        cost:
          $ref: '#/components/schemas/CostResult'

    NormalizedUsage:
      type: object
      properties:
        input_tokens: { type: integer }
        output_tokens: { type: integer }
        cache_read_input_tokens: { type: integer }
        cache_creation_input_tokens: { type: integer }
        cache_write_input_tokens: { type: integer }
        reasoning_tokens: { type: integer }
        tool_use_prompt_tokens: { type: integer }
        audio_input_tokens: { type: integer }
        audio_output_tokens: { type: integer }
        image_input_tokens: { type: integer }
        image_output_tokens: { type: integer }
        accepted_prediction_tokens: { type: integer }
        rejected_prediction_tokens: { type: integer }
        service_tier: { type: string }
        dimensions:
          type: object
          additionalProperties:
            type: integer

    ModelResolutionMetadata:
      type: object
      properties:
        canonical_model_id: { type: string }
        offering_id: { type: string }
        deployment_id: { type: string }
        provider_id: { type: string }
        api_protocol_id: { type: string }
        native_model_id: { type: string }

    PricingSnapshot:
      type: object
      properties:
        status:
          type: string
          enum: [known, partial, unknown, free]
        currency: { type: string }
        effective_at:
          type: string
          format: date-time
        source: { type: string }
        rates_per_1m:
          type: object
          additionalProperties:
            type: number
        missing_dimensions:
          type: array
          items: { type: string }

    ProviderCost:
      type: object
      properties:
        total: { type: number }
        currency: { type: string }
        source: { type: string }
        raw: {}

    CostResult:
      type: object
      properties:
        status:
          type: string
          enum: [known, partial, unknown, free]
        total: { type: number }
        currency: { type: string }
        source: { type: string }
        missing_dimensions:
          type: array
          items: { type: string }
        dimensions:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              quantity: { type: integer }
              rate_per_1m: { type: number }
              cost: { type: number }

    AssistantNodeMetadata:
      type: object
      properties:
        model_resolution:
          $ref: '#/components/schemas/ModelResolutionMetadata'
        normalized_usage:
          $ref: '#/components/schemas/NormalizedUsage'
        pricing_snapshot:
          $ref: '#/components/schemas/PricingSnapshot'
        provider_cost:
          $ref: '#/components/schemas/ProviderCost'

    SSEStream:
      type: string
      description: |
        Server-Sent Events stream. Events:

        ```
        event: start
        data: {}

        event: delta
        data: {"content": "..."}

        event: done
        data: {"node_id": "...", "output_group_id": "...", "usage": {...}, "metadata": {...}, "cost": {...}}

        event: error
        data: error message
        ```
